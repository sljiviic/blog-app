name: Keep backend awake

# Render's free tier puts the service to sleep after ~15 minutes of inactivity,
# which means a cold start of up to a minute for whoever opens the demo first.
on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping health endpoint
        run: curl -fsS --max-time 90 https://blog-app-h24l.onrender.com/
